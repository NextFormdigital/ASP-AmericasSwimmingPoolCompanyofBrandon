<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASP - America's Swimming Pool Company of Brandon</title>

<style>
:root {
  --bg: #0b1220;
  --card: #111c33;
  --accent: #22d3ee;
  --text: #e2e8f0;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  scroll-behavior: smooth;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 22px;
  background: #020617;
  position: sticky;
  top: 0;
}

header h2 {
  margin: 0;
  font-size: 18px;
  letter-spacing: 0.5px;
}

nav a {
  color: var(--accent);
  margin-left: 14px;
  cursor: pointer;
  text-decoration: none;
}

.hero {
  text-align: center;
  padding: 90px 20px;
  background: linear-gradient(135deg, #0ea5e9, #22d3ee);
  color: #020617;
}

.hero h1 {
  font-size: 34px;
  margin-bottom: 10px;
}

.hero button {
  margin-top: 18px;
  padding: 12px 22px;
  border: none;
  border-radius: 8px;
  background: #020617;
  color: var(--accent);
  cursor: pointer;
  font-weight: bold;
}

.section {
  padding: 60px 20px;
  text-align: center;
}

.section h2 {
  margin-bottom: 20px;
}

.buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

.buttons button {
  padding: 10px 14px;
  border: none;
  background: var(--accent);
  color: #020617;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s ease;
  font-weight: 600;
}

.buttons button:hover {
  transform: scale(1.05);
}

.buttons button.active {
  background: #38bdf8;
  box-shadow: 0 0 10px rgba(34, 211, 238, 0.4);
}

#service-box {
  margin-top: 22px;
  padding: 18px;
  background: var(--card);
  border-radius: 10px;
  max-width: 650px;
  margin-left: auto;
  margin-right: auto;
  min-height: 60px;
}

iframe {
  width: 100%;
  height: 300px;
  border: 0;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <h2>ASP Brandon</h2>
  <nav>
    <a onclick="scrollToSection('services')">Services</a>
    <a onclick="scrollToSection('map')">Location</a>
  </nav>
</header>

<section class="hero">
  <h1>America’s Swimming Pool Company of Brandon</h1>
  <p>Luxury pool care. Clean water. Zero stress. Every time.</p>
  <button onclick="scrollToSection('services')">Explore Services</button>
</section>

<section class="section" id="services">
  <h2>Our Services</h2>

  <div class="buttons">
    <button onclick="showService(this,'cleaning')">Pool Cleaning</button>
    <button onclick="showService(this,'commercial')">Commercial Maintenance</button>
    <button onclick="showService(this,'repair')">Equipment Repair</button>
    <button onclick="showService(this,'one')">One-Time Cleaning</button>
    <button onclick="showService(this,'ongoing')">Ongoing Service</button>
    <button onclick="showService(this,'seasonal')">Seasonal Opening/Closing</button>
    <button onclick="showService(this,'tile')">Tile Cleaning</button>
    <button onclick="showService(this,'water')">Water Testing</button>
  </div>

  <div id="service-box">
    Click a service to see what we do.
  </div>
</section>

<section class="section" id="map">
  <h2>Find Us</h2>
  <iframe 
    src="https://www.google.com/maps?q=3402+Cypress+Landing+Drive+Valrico+Florida+33596&output=embed">
  </iframe>
</section>

<script>
const serviceData = {
  cleaning: "Routine pool cleaning that keeps your water clear, balanced, and swim-ready year-round.",
  commercial: "Full-service maintenance for apartment complexes, gyms, and commercial pools.",
  repair: "Diagnostics and repair for pumps, filters, heaters, and pool systems.",
  one: "Deep one-time restoration cleaning for neglected or event-ready pools.",
  ongoing: "Scheduled maintenance plans so your pool stays perfect without effort.",
  seasonal: "Opening and closing service to protect your pool during seasonal changes.",
  tile: "Precision tile and wall cleaning for a polished, luxury finish.",
  water: "Professional water testing and chemical balancing for safe swimming conditions."
};

function showService(btn, key) {
  document.getElementById("service-box").innerText = serviceData[key];

  document.querySelectorAll(".buttons button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
