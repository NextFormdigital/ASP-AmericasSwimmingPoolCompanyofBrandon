<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASP - America's Swimming Pool Company of Brandon</title>

<style>
:root{
  --bg:#0b1220;
  --card:#111c33;
  --accent:#22d3ee;
  --text:#e2e8f0;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  background:#020617;
  position:sticky;
  top:0;
  z-index:10;
}

nav a{
  color:var(--accent);
  margin-left:12px;
  cursor:pointer;
  text-decoration:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:90px 20px;
  background:linear-gradient(135deg,#0ea5e9,#22d3ee);
  color:#020617;
}

.hero h1{font-size:34px;margin-bottom:10px;}

.hero button{
  margin-top:16px;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#020617;
  color:var(--accent);
  cursor:pointer;
  font-weight:bold;
}

/* SERVICES */
.section{
  padding:60px 20px;
  text-align:center;
}

.buttons{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.buttons button{
  padding:10px 14px;
  border:none;
  background:var(--accent);
  color:#020617;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.buttons button:hover{transform:scale(1.05);}
.buttons button.active{box-shadow:0 0 12px rgba(34,211,238,0.4);}

#service-box{
  margin-top:20px;
  padding:18px;
  background:var(--card);
  border-radius:10px;
  max-width:650px;
  margin-left:auto;
  margin-right:auto;
  min-height:60px;
}

/* MAP */
iframe{
  width:100%;
  height:300px;
  border:0;
  border-radius:10px;
}

/* BOOKING SLIDE PANEL */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:20;
}

.booking-panel{
  position:fixed;
  right:-420px;
  top:0;
  width:380px;
  height:100%;
  background:#0f172a;
  padding:20px;
  transition:0.35s ease;
  z-index:30;
  box-shadow:-10px 0 30px rgba(0,0,0,0.4);
}

.booking-panel.open{
  right:0;
}

.overlay.show{
  display:block;
}

.booking-panel h2{
  margin-top:0;
}

form{
  display:flex;
  flex-direction:column;
}

input,select{
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:6px;
}

.submit-btn{
  margin-top:10px;
  background:var(--accent);
  border:none;
  padding:12px;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
}

.close-btn{
  background:transparent;
  color:var(--accent);
  border:none;
  font-size:16px;
  cursor:pointer;
  float:right;
}
</style>
</head>

<body>

<header>
  <h2>ASP Brandon</h2>
  <nav>
    <a onclick="scrollToSection('services')">Services</a>
    <a onclick="scrollToSection('map')">Location</a>
    <a onclick="openBooking()">Book</a>
  </nav>
</header>

<section class="hero">
  <h1>America’s Swimming Pool Company of Brandon</h1>
  <p>Luxury care. Clean water. No stress.</p>
  <button onclick="openBooking()">Book a Service</button>
</section>

<section class="section" id="services">
  <h2>Our Services</h2>

  <div class="buttons">
    <button onclick="showService(this,'cleaning')">Pool Cleaning</button>
    <button onclick="showService(this,'commercial')">Commercial</button>
    <button onclick="showService(this,'repair')">Equipment Repair</button>
    <button onclick="showService(this,'one')">One-Time</button>
    <button onclick="showService(this,'ongoing')">Ongoing</button>
    <button onclick="showService(this,'seasonal')">Seasonal</button>
    <button onclick="showService(this,'tile')">Tile Cleaning</button>
    <button onclick="showService(this,'water')">Water Testing</button>
  </div>

  <div id="service-box">
    Tap a service to reveal details.
  </div>
</section>

<section class="section" id="map">
  <h2>Find Us</h2>
  <iframe 
    src="https://www.google.com/maps?q=3402+Cypress+Landing+Drive+Valrico+Florida+33596&output=embed">
  </iframe>
</section>

<!-- BOOKING SLIDE -->
<div class="overlay" id="overlay" onclick="closeBooking()"></div>

<div class="booking-panel" id="bookingPanel">
  <button class="close-btn" onclick="closeBooking()">✕ Close</button>

  <h2>Book Service</h2>

  <form id="bookingForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>

    <select id="service" required>
      <option value="">Select Service</option>
      <option>Pool Cleaning</option>
      <option>Commercial</option>
      <option>Equipment Repair</option>
      <option>One-Time</option>
      <option>Ongoing</option>
      <option>Seasonal</option>
      <option>Tile Cleaning</option>
      <option>Water Testing</option>
    </select>

    <input type="date" id="date" required>

    <button class="submit-btn" type="submit">Confirm Booking</button>
  </form>

  <p id="msg"></p>
</div>

<script>
const services = {
  cleaning:"Routine cleaning keeps pools crystal clear and balanced.",
  commercial:"Full maintenance for commercial and shared pools.",
  repair:"We fix pumps, filters, heaters, and system issues.",
  one:"Deep one-time restoration cleaning.",
  ongoing:"Scheduled maintenance so your pool stays perfect.",
  seasonal:"Opening/closing service for seasonal care.",
  tile:"Tile and surface detailing for a luxury finish.",
  water:"Water testing and chemical balancing for safety."
};

function showService(btn,key){
  document.getElementById("service-box").innerText = services[key];

  document.querySelectorAll(".buttons button")
  .forEach(b=>b.classList.remove("active"));

  btn.classList.add("active");
}

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* BOOKING SLIDE */
function openBooking(){
  document.getElementById("bookingPanel").classList.add("open");
  document.getElementById("overlay").classList.add("show");
}

function closeBooking(){
  document.getElementById("bookingPanel").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

/* FORM */
document.getElementById("bookingForm").addEventListener("submit",function(e){
  e.preventDefault();
  document.getElementById("msg").innerText =
    "Booking received. We’ll reach out shortly.";
  this.reset();
});
</script>

</body>
</html>
